<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Allusion'26 — Transcription for the Next Big Speech</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ember:      #C0390B;
  --ember-light:#E84920;
  --ember-dim:  #7A2208;
  --amber:      #D4870A;
  --amber-light:#F0A830;
  --amber-pale: #F5C96A;
  --dark:       #0D0700;
  --dark-mid:   #160B02;
  --dark-card:  #1E0F04;
  --dark-surface:#261408;
  --dark-border: #3A1E08;
  --text-white:  #F9EDD8;
  --text-warm:   #C8A87A;
  --text-muted:  #7A5A38;
  --border:      rgba(208,135,10,0.2);
  --border-glow: rgba(208,135,10,0.45);
}

html { scroll-behavior: smooth; }
body {
  background: var(--dark);
  color: var(--text-white);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  letter-spacing: 0.02em;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--dark); }
::-webkit-scrollbar-thumb { background: var(--ember-dim); border-radius: 3px; }

/* NOISE OVERLAY */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  pointer-events: none; z-index: 9999; opacity: 0.35;
}

/* =========== ANIMATIONS =========== */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(28px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes pulse {
  0%,100% { opacity:0.7; } 50% { opacity:1; }
}
@keyframes scroll-left {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
@keyframes spinSlow {
  from { transform: rotate(0deg); } to { transform: rotate(360deg); }
}
@keyframes micFloat {
  0%,100% { transform: translateY(0px) rotate(-2deg); }
  50% { transform: translateY(-12px) rotate(2deg); }
}

/* =========== NAV =========== */
nav {
  position: fixed; top:0; left:0; right:0; z-index:800;
  height: 66px;
  display: flex; align-items:center; justify-content:space-between;
  padding: 0 4rem;
  background: linear-gradient(180deg, rgba(13,7,0,0.97) 0%, rgba(13,7,0,0.82) 100%);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(14px);
}
.nav-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem; letter-spacing: 0.14em;
  color: var(--amber-light); text-decoration:none;
}
.nav-logo span { color: var(--ember); }
.nav-links { display:flex; gap:2.2rem; list-style:none; }
.nav-links a {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.7rem; font-weight:500;
  letter-spacing: 0.2em; text-transform:uppercase;
  color: var(--text-warm); text-decoration:none;
  transition: color 0.3s;
  position: relative;
}
.nav-links a::after {
  content:''; position:absolute; bottom:-4px; left:0; right:0;
  height:1px; background:var(--amber);
  transform:scaleX(0); transform-origin:left; transition:transform 0.3s;
}
.nav-links a:hover { color:var(--amber-light); }
.nav-links a:hover::after { transform:scaleX(1); }
.nav-cta {
  font-family:'DM Sans',sans-serif; font-size:0.7rem;
  font-weight:600; letter-spacing:0.18em; text-transform:uppercase;
  color: var(--dark); background: linear-gradient(135deg, var(--amber-light), var(--amber));
  border:none; cursor:pointer; padding:0.55rem 1.5rem;
  text-decoration:none; display:inline-block;
  clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  transition:opacity 0.3s;
}
.nav-cta:hover { opacity:0.82; }

/* =========== HERO =========== */
#hero {
  min-height: 100vh; position:relative;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center; padding:8rem 2rem 5rem;
  overflow:hidden;
}
.hero-bg {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 80% 55% at 50% 25%, rgba(96,32,4,0.55) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 15% 85%, rgba(192,57,11,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 85% 70%, rgba(212,135,10,0.1) 0%, transparent 55%),
    var(--dark);
}
.hero-grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(212,135,10,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,135,10,0.05) 1px, transparent 1px);
  background-size: 55px 55px;
  mask-image: radial-gradient(ellipse 70% 70% at 50% 40%, black 20%, transparent 80%);
}
.hero-topline {
  position:absolute; top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg, transparent, var(--ember), var(--amber-light), var(--ember), transparent);
  animation: pulse 3.5s ease-in-out infinite;
}
.hero-eyebrow {
  font-family:'DM Sans',sans-serif; font-size:0.68rem;
  font-weight:500; letter-spacing:0.35em; text-transform:uppercase;
  color:var(--amber); margin-bottom:1.4rem; position:relative;
  display:flex; align-items:center; gap:1rem;
  animation: fadeUp 0.9s ease 0.2s both;
}
.hero-eyebrow::before, .hero-eyebrow::after {
  content:''; flex:1; height:1px;
  background: linear-gradient(90deg, transparent, var(--ember-dim));
}
.hero-eyebrow::after { background: linear-gradient(90deg, var(--ember-dim), transparent); }

.hero-title {
  font-family:'Bebas Neue', sans-serif;
  font-size: clamp(5rem,12vw,10.5rem);
  line-height:0.88; letter-spacing:0.06em;
  margin-bottom:0.25rem; position:relative;
  animation: fadeUp 0.9s ease 0.35s both;
}
.hero-title-main {
  background: linear-gradient(135deg, #F5C96A 0%, #E8951A 35%, #C0390B 70%, #8B1A0A 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  display:block;
}
.hero-title-year {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.4rem,3vw,2.2rem);
  color:var(--ember-dim); display:block;
  letter-spacing:0.35em; margin-top:0.3rem;
}
.hero-subtitle {
  font-family:'Playfair Display',serif;
  font-size:clamp(0.95rem,2.2vw,1.35rem);
  font-weight:400; font-style:italic;
  color:var(--text-warm); letter-spacing:0.15em;
  margin-bottom:0.9rem;
  animation: fadeUp 0.9s ease 0.5s both;
}
.hero-tagline {
  font-family:'DM Sans',sans-serif; font-size:0.7rem;
  font-weight:500; letter-spacing:0.45em; text-transform:uppercase;
  color:var(--amber); margin-bottom:2.8rem;
  animation: fadeUp 0.9s ease 0.62s both;
}
.hero-meta {
  display:flex; gap:2.8rem; align-items:center;
  margin-bottom:2.8rem;
  animation: fadeUp 0.9s ease 0.74s both;
}
.hero-meta-item { text-align:center; }
.hero-meta-label {
  font-size:0.6rem; letter-spacing:0.28em;
  text-transform:uppercase; color:var(--text-muted);
  display:block; margin-bottom:0.25rem;
}
.hero-meta-value {
  font-family:'Cinzel',serif; font-size:0.92rem;
  color:var(--text-white); letter-spacing:0.1em;
}
.hero-meta-sep { width:1px; height:38px; background:var(--border); }
.hero-buttons {
  display:flex; gap:1rem; justify-content:center;
  animation: fadeUp 0.9s ease 0.85s both;
}
.btn-primary {
  font-family:'DM Sans',sans-serif; font-size:0.72rem;
  font-weight:600; letter-spacing:0.2em; text-transform:uppercase;
  color:var(--dark); background:linear-gradient(135deg, var(--amber-light), var(--amber));
  border:none; cursor:pointer; padding:0.85rem 2.2rem; text-decoration:none;
  clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  transition:opacity 0.3s; display:inline-block;
}
.btn-primary:hover { opacity:0.82; }
.btn-secondary {
  font-family:'DM Sans',sans-serif; font-size:0.72rem;
  font-weight:500; letter-spacing:0.2em; text-transform:uppercase;
  color:var(--amber); background:transparent;
  border:1px solid var(--border-glow); cursor:pointer;
  padding:0.85rem 2.2rem; text-decoration:none;
  clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  transition:all 0.3s; display:inline-block;
}
.btn-secondary:hover { background:rgba(212,135,10,0.1); color:var(--amber-light); }

/* Floating mic decoration */
.hero-mic {
  position:absolute; right:8%; bottom:10%;
  font-size:8rem; opacity:0.06;
  animation: micFloat 5s ease-in-out infinite;
  filter: sepia(1) saturate(3);
  user-select:none; pointer-events:none;
}
.hero-mic2 {
  position:absolute; left:5%; top:20%;
  font-size:5rem; opacity:0.04;
  animation: micFloat 7s ease-in-out infinite reverse;
  user-select:none; pointer-events:none;
}

/* STATS TICKER */
.stats-ticker {
  background: var(--dark-surface);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 1.1rem 0; overflow:hidden;
}
.stats-ticker-inner {
  display:flex; gap:0; width:max-content;
  animation: scroll-left 28s linear infinite;
}
.stats-ticker-inner:hover { animation-play-state:paused; }
.stat-item {
  display:flex; align-items:center; gap:1.2rem;
  padding:0 3rem; border-right:1px solid var(--border);
  white-space:nowrap;
}
.stat-num {
  font-family:'Bebas Neue',sans-serif; font-size:1.6rem;
  color:var(--amber-light); letter-spacing:0.06em;
}
.stat-label {
  font-size:0.65rem; font-weight:500;
  letter-spacing:0.22em; text-transform:uppercase;
  color:var(--text-muted);
}

/* =========== SECTIONS =========== */
section {
  padding: 6rem 2rem;
  position:relative;
}
.section-inner { max-width:1100px; margin:0 auto; }
.section-header { text-align:center; margin-bottom:3.5rem; }
.section-eyebrow {
  font-family:'DM Sans',sans-serif; font-size:0.67rem;
  font-weight:600; letter-spacing:0.32em; text-transform:uppercase;
  color:var(--ember); display:block; margin-bottom:0.8rem;
}
.section-title {
  font-family:'Bebas Neue',sans-serif; font-size:clamp(2.4rem,5vw,4rem);
  letter-spacing:0.08em; color:var(--text-white);
  line-height:1; margin-bottom:0.8rem;
}
.section-line {
  width:60px; height:2px; margin:0 auto 1.2rem;
  background:linear-gradient(90deg,var(--ember),var(--amber));
}
.section-desc {
  font-family:'Playfair Display',serif; font-style:italic;
  font-size:1rem; color:var(--text-muted);
  max-width:560px; margin:0 auto; line-height:1.7;
}

/* alt section bg */
section.alt-bg { background:var(--dark-mid); }
section.alt-bg2 { background:var(--dark-card); }

/* =========== ABOUT =========== */
.about-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:3rem; align-items:center;
}
.about-text p {
  font-size:1rem; line-height:1.85;
  color:var(--text-warm); margin-bottom:1.2rem;
}
.about-text p strong { color:var(--amber-light); font-weight:600; }
.about-badge {
  display:inline-flex; align-items:center; gap:0.7rem;
  background:rgba(192,57,11,0.12); border:1px solid rgba(192,57,11,0.3);
  padding:0.5rem 1.2rem; margin-bottom:1.5rem;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
}
.about-badge span { font-size:0.65rem; font-weight:600; letter-spacing:0.25em; text-transform:uppercase; color:var(--ember-light); }
.about-stats {
  display:grid; grid-template-columns:1fr 1fr;
  gap:1rem; margin-top:1.8rem;
}
.astat {
  background:var(--dark-surface); border:1px solid var(--border);
  padding:1.2rem; text-align:center;
}
.astat-num {
  font-family:'Bebas Neue',sans-serif; font-size:2rem;
  color:var(--amber-light); letter-spacing:0.06em; display:block;
}
.astat-label {
  font-size:0.62rem; font-weight:500; letter-spacing:0.2em;
  text-transform:uppercase; color:var(--text-muted);
}
.about-visual {
  position:relative; display:flex;
  align-items:center; justify-content:center;
  height:320px;
}
.about-mic-wrap {
  font-size:9rem; animation:micFloat 5s ease-in-out infinite;
  filter: drop-shadow(0 0 40px rgba(208,135,10,0.4));
}
.about-ring {
  position:absolute; width:280px; height:280px;
  border:1px solid var(--border-glow); border-radius:50%;
  animation: spinSlow 20s linear infinite;
}
.about-ring2 {
  position:absolute; width:220px; height:220px;
  border:1px dashed var(--border); border-radius:50%;
  animation: spinSlow 12s linear infinite reverse;
}

/* =========== COMPETITION CATEGORIES =========== */
.categories-grid {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:1.5rem;
}
.cat-card {
  background:var(--dark-surface); border:1px solid var(--border);
  padding:2rem 1.5rem; text-align:center;
  transition:all 0.3s; position:relative; overflow:hidden;
}
.cat-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg,var(--ember),var(--amber));
  transform:scaleX(0); transform-origin:left; transition:transform 0.3s;
}
.cat-card:hover { border-color:var(--border-glow); transform:translateY(-4px); }
.cat-card:hover::before { transform:scaleX(1); }
.cat-icon { font-size:2.5rem; margin-bottom:1rem; display:block; }
.cat-title {
  font-family:'Bebas Neue',sans-serif; font-size:1.4rem;
  letter-spacing:0.08em; color:var(--amber-light); margin-bottom:0.6rem;
}
.cat-desc { font-size:0.88rem; color:var(--text-muted); line-height:1.6; }
.cat-tag {
  display:inline-block; margin-top:1rem;
  font-size:0.6rem; font-weight:600; letter-spacing:0.22em; text-transform:uppercase;
  color:var(--ember-light); background:rgba(192,57,11,0.12);
  border:1px solid rgba(192,57,11,0.25); padding:0.3rem 0.8rem;
}

/* =========== OBJECTIVES =========== */
.obj-grid {
  display:grid; grid-template-columns:repeat(2,1fr); gap:1.2rem;
}
.obj-item {
  display:flex; gap:1.2rem; align-items:flex-start;
  background:var(--dark-surface); border:1px solid var(--border);
  padding:1.5rem; transition:border-color 0.3s;
}
.obj-item:hover { border-color:var(--border-glow); }
.obj-num {
  font-family:'Bebas Neue',sans-serif; font-size:2rem;
  color:var(--ember-dim); letter-spacing:0.06em;
  min-width:2.5rem; line-height:1;
}
.obj-text { font-size:0.9rem; color:var(--text-warm); line-height:1.65; }

/* =========== SPONSORSHIP =========== */
.sponsor-tier-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem;
  margin-bottom:2rem;
}
.sponsor-tier-grid.bottom { grid-template-columns:repeat(4,1fr); }
.tier-card {
  background:var(--dark-surface); border:2px solid var(--border);
  padding:1.8rem 1.2rem; text-align:center; position:relative; overflow:hidden;
  transition:all 0.3s;
}
.tier-card.featured {
  border-color:var(--amber); background:linear-gradient(180deg,rgba(212,135,10,0.08),var(--dark-surface));
}
.tier-card.featured::after {
  content:'TOP TIER'; position:absolute; top:12px; right:-18px;
  font-size:0.52rem; font-weight:700; letter-spacing:0.2em;
  color:var(--dark); background:var(--amber);
  padding:0.2rem 1.2rem; transform:rotate(35deg);
}
.tier-card:hover { transform:translateY(-5px); border-color:var(--border-glow); }
.tier-name {
  font-family:'Bebas Neue',sans-serif; font-size:1.3rem;
  letter-spacing:0.1em; color:var(--text-white); margin-bottom:0.5rem;
}
.tier-amount {
  font-family:'Bebas Neue',sans-serif; font-size:2rem;
  color:var(--amber-light); letter-spacing:0.05em; display:block;
}
.tier-currency { font-size:0.7rem; color:var(--text-muted); letter-spacing:0.15em; }
.tier-sep { width:30px; height:1px; background:var(--border); margin:0.8rem auto; }
.tier-benefits { list-style:none; margin-top:0.6rem; }
.tier-benefits li {
  font-size:0.75rem; color:var(--text-muted);
  padding:0.3rem 0; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:0.5rem;
}
.tier-benefits li::before { content:'✓'; color:var(--amber); font-size:0.7rem; }
.tier-benefits li.no::before { content:'—'; color:var(--text-muted); }
.tier-benefits li.no { opacity:0.45; }

/* Alternative partnerships */
.alt-partner-grid {
  display:grid; grid-template-columns:repeat(5,1fr); gap:1rem; margin-top:1.5rem;
}
.alt-card {
  background:var(--dark-surface); border:1px solid var(--border);
  padding:1.5rem 1rem; text-align:center; transition:all 0.3s;
}
.alt-card:hover { border-color:var(--border-glow); transform:translateY(-3px); }
.alt-icon { font-size:1.8rem; margin-bottom:0.6rem; display:block; }
.alt-name {
  font-family:'DM Sans',sans-serif; font-size:0.72rem; font-weight:600;
  letter-spacing:0.15em; text-transform:uppercase; color:var(--amber);
}

/* =========== COMMITTEE =========== */
.exec-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem;
}
.exec-card {
  background:var(--dark-surface); border:1px solid var(--border);
  padding:2rem 1.5rem; text-align:center; position:relative;
  transition:all 0.3s; overflow:hidden;
}
.exec-card::before {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,var(--ember),var(--amber));
  transform:scaleX(0); transform-origin:left; transition:transform 0.4s;
}
.exec-card:hover { border-color:var(--border-glow); }
.exec-card:hover::before { transform:scaleX(1); }
.exec-avatar {
  width:80px; height:80px; border-radius:50%;
  border:2px solid var(--border-glow);
  background:var(--dark-card); margin:0 auto 1rem;
  display:flex; align-items:center; justify-content:center;
  font-size:2rem; overflow:hidden;
}
.exec-avatar img { width:100%; height:100%; object-fit:cover; }
.exec-role {
  font-size:0.62rem; font-weight:600; letter-spacing:0.25em; text-transform:uppercase;
  color:var(--ember); margin-bottom:0.4rem; display:block;
}
.exec-name {
  font-family:'Playfair Display',serif; font-size:1.05rem;
  color:var(--text-white); margin-bottom:0.3rem;
}
.exec-contact { font-size:0.75rem; color:var(--text-muted); }

/* =========== FAQ =========== */
.faq-list { max-width:720px; margin:0 auto; }
.faq-item { border-bottom:1px solid var(--border); }
.faq-q {
  width:100%; text-align:left; background:none; border:none;
  cursor:pointer; padding:1.3rem 0;
  display:flex; justify-content:space-between; align-items:center;
  font-family:'DM Sans',sans-serif; font-size:0.95rem;
  font-weight:500; color:var(--text-white); letter-spacing:0.02em;
  transition:color 0.3s;
}
.faq-q:hover { color:var(--amber-light); }
.faq-icon {
  font-family:'DM Sans',sans-serif; font-size:1.4rem;
  color:var(--amber); transition:transform 0.35s;
  line-height:1; min-width:18px; text-align:center;
}
.faq-icon.open { transform:rotate(45deg); }
.faq-a {
  font-size:0.88rem; color:var(--text-muted); line-height:1.75;
  max-height:0; overflow:hidden; transition:max-height 0.4s ease, padding 0.3s;
}
.faq-a.open { max-height:300px; padding-bottom:1.2rem; }

/* =========== CONTACT / REGISTER =========== */
#contact {
  background:
    radial-gradient(ellipse 70% 60% at 50% 30%, rgba(96,32,4,0.45) 0%, transparent 65%),
    var(--dark-mid);
  text-align:center;
}
.contact-inner { max-width:700px; margin:0 auto; }
.contact-tagline {
  font-family:'DM Sans',sans-serif; font-size:0.7rem; font-weight:500;
  letter-spacing:0.35em; text-transform:uppercase; color:var(--ember);
  margin-bottom:0.8rem;
}
.contact-title {
  font-family:'Bebas Neue',sans-serif; font-size:clamp(2.8rem,6vw,5rem);
  letter-spacing:0.08em; color:var(--text-white); line-height:1;
  margin-bottom:1rem;
}
.contact-title span { color:var(--amber-light); }
.contact-desc {
